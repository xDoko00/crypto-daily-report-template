name: Günlük Kripto Raporu

# Rapor HER GÜN tam 08:00 TSİ'de gider (SABİT saat, alışkanlık için).
# GitHub cron tetikleme saati kayabildiğinden hedeften ÖNCE (07:35 TSİ) tetikleriz;
# report.py tam 08:00'e kadar bekleyip öyle gönderir (DELIVER_AT_TR). Böylece teslim sabittir.
on:
  schedule:
    - cron: "35 4 * * *"       # 04:35 UTC = 07:35 TSİ tetikleme; teslim tam 08:00 (~25 dk pay)
  workflow_dispatch:            # GitHub arayüzünden elle çalıştırma
    inputs:
      mode:
        description: "Gönderim modu: normal (kanal) / test (admin) / both (ikisi)"
        type: choice
        options:
          - normal
          - test
          - both
        default: normal
      deliver_at:
        description: "İsteğe bağlı sabit teslim saati TSİ (HH:MM). Boşsa hemen gönderir."
        type: string
        default: ""

# Aynı anda tek çalışma yeter; üst üste binmeyi engelle.
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  rapor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 40   # tam saate kadar bekleme payını da kapsar

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node.js kur (Claude Code CLI için)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python bağımlılıklarını kur
        run: pip install -r requirements.txt

      - name: Claude Code CLI kur
        run: npm install -g @anthropic-ai/claude-code

      - name: Yazı tipi kur (kart için)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core

      - name: Raporu üret ve gönder
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID:  ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          # Zamanlanmış çalışmada sabit teslim 08:00 TSİ; manuel çalışmada kullanıcı
          # saat girdiyse o, girmediyse boş (hemen gönderir).
          DELIVER_AT_TR: ${{ github.event_name == 'schedule' && '08:00' || inputs.deliver_at }}
        run: |
          case "${{ inputs.mode }}" in
            test) python report.py --test ;;
            both) python report.py --both ;;
            *)    python report.py ;;
          esac

      - name: Takip durumunu kaydet
        if: ${{ inputs.mode != 'test' }}
        run: |
          if [ -n "$(git status --porcelain state/takip.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/takip.json
            git commit -m "chore: gunluk takip durumu"
            git pull --rebase --autostash origin main || true
            git push || echo "push basarisiz (best-effort; rapor gonderildi)"
          else
            echo "takip degismedi"
          fi
